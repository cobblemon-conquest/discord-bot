name: Discord Bot CI and Docker Release

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Test and Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

      - name: Read package version
        id: package
        run: |
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + pkg.version + '\\n');"

      - name: Build Docker image
        run: |
          docker build \
            --file Dockerfile \
            --tag conquest-bot:${{ steps.package.outputs.version }} \
            .

  release_and_publish:
    name: Create Release and Publish Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: version
        run: |
          if git show HEAD^:package.json > /tmp/previous_package.json 2>/dev/null; then
            export HAS_PREVIOUS_PACKAGE=true
          else
            export HAS_PREVIOUS_PACKAGE=false
          fi

          node -e "
          const fs=require('node:fs');
          const current=JSON.parse(fs.readFileSync('package.json','utf8')).version;
          let previous='';
          if (process.env.HAS_PREVIOUS_PACKAGE==='true') {
            previous=JSON.parse(fs.readFileSync('/tmp/previous_package.json','utf8')).version;
          }
          const changed=current!==previous;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'changed=' + changed + '\\n');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'current=' + current + '\\n');
          "

      - name: Setup Docker Buildx
        if: steps.version.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.version.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        if: steps.version.outputs.changed == 'true'
        id: image
        run: |
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/conquest-bot" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.version.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.current }}
            ${{ steps.image.outputs.name }}:latest

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.current }}
          name: ${{ steps.version.outputs.current }}
          generate_release_notes: true
